# Local development datastores for silo-push-relay.
#
#   docker compose up -d
#   export RELAY_DATABASE_URL="postgres://relay:relay@localhost:5432/relay?sslmode=disable"
#   export RELAY_API_KEY_PEPPER="change-me-to-a-long-random-value"
#   make migrate-up && make run
#
# These credentials are for local development only.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relay
    ports:
      - "5432:5432"
    volumes:
      - relay_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  relay_pg:
