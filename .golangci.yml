# golangci-lint v2 configuration.
# Run with: golangci-lint run  (installed in CI via golangci-lint-action).
version: "2"

run:
  timeout: 5m

linters:
  # "standard" enables the maintained default set (errcheck, govet, ineffassign,
  # staticcheck, unused). Add more deliberately as the codebase grows.
  default: standard

formatters:
  enable:
    - gofmt
    - goimports
